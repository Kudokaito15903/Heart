<!DOCTYPE HTML>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ninh Trang ♥</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@200;300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0a0010;
      overflow: hidden;
    }

    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    canvas#pinkboard {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #center {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -52%);
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }

    #name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 4.5vw, 3rem);
      font-weight: 300;
      font-style: italic;
      color: #fff0f5;
      letter-spacing: 0.12em;
      line-height: 1;
      text-shadow:
        0 0 40px rgba(255,150,190,0.9),
        0 0 80px rgba(230,80,140,0.5),
        0 0 140px rgba(180,40,100,0.3);
      animation: pulse-name 3s ease-in-out infinite;
    }

    #tagline {
      font-family: 'Raleway', sans-serif;
      font-size: clamp(0.55rem, 1.2vw, 0.72rem);
      font-weight: 200;
      color: rgba(255,200,220,0.75);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      margin-top: 1rem;
      animation: fade-in 3s ease forwards, pulse-tag 4s 3s ease-in-out infinite;
      opacity: 0;
    }

    #heart-icon {
      font-size: 1.1rem;
      color: #ff7aaa;
      display: inline-block;
      animation: heartbeat 1.2s ease-in-out infinite;
      margin: 0 0.5rem;
      text-shadow: 0 0 12px rgba(255,100,160,0.8);
    }

    @keyframes pulse-name {
      0%, 100% { text-shadow: 0 0 40px rgba(255,150,190,0.9), 0 0 80px rgba(230,80,140,0.5), 0 0 140px rgba(180,40,100,0.3); }
      50%       { text-shadow: 0 0 60px rgba(255,170,210,1),   0 0 110px rgba(240,100,160,0.7), 0 0 180px rgba(200,60,120,0.5); }
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-tag {
      0%, 100% { opacity: 0.75; }
      50%       { opacity: 1; }
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%       { transform: scale(1.35); }
      28%       { transform: scale(1); }
      42%       { transform: scale(1.2); }
      70%       { transform: scale(1); }
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; }
      50%       { opacity: 0.9; }
    }

    /* ── Music button ── */
    #music-btn {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.55rem 1.5rem 0.55rem 1.1rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,150,190,0.35);
      border-radius: 999px;
      cursor: pointer;
      font-family: 'Raleway', sans-serif;
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,210,225,0.85);
      backdrop-filter: blur(8px);
      transition: background 0.3s, border-color 0.3s, color 0.3s, box-shadow 0.3s;
      animation: fade-in 4s ease forwards;
      opacity: 0;
    }
    #music-btn:hover {
      background: rgba(255,100,160,0.18);
      border-color: rgba(255,150,190,0.75);
      color: #fff;
      box-shadow: 0 0 22px rgba(230,80,140,0.4);
    }
    #music-btn.playing {
      background: rgba(255,80,140,0.2);
      border-color: rgba(255,150,190,0.8);
      box-shadow: 0 0 28px rgba(230,80,140,0.5);
    }
    #music-btn .icon {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(255,100,160,0.25);
      border: 1px solid rgba(255,150,190,0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      transition: background 0.3s;
      flex-shrink: 0;
    }
    #music-btn.playing .icon {
      background: rgba(255,80,140,0.4);
      animation: pulse-btn 1.4s ease-in-out infinite;
    }
    @keyframes pulse-btn {
      0%, 100% { box-shadow: 0 0 0 0 rgba(230,80,140,0.5); }
      50%       { box-shadow: 0 0 0 6px rgba(230,80,140,0); }
    }

    /* Equalizer bars shown while playing */
    .eq { display: none; gap: 2px; align-items: flex-end; height: 14px; }
    #music-btn.playing .eq { display: flex; }
    #music-btn.playing .label-play { display: none; }
    #music-btn:not(.playing) .label-pause { display: none; }
    .eq span {
      width: 3px;
      background: #ff88bb;
      border-radius: 2px;
      animation: eq-bar 0.6s ease-in-out infinite alternate;
    }
    .eq span:nth-child(1) { height: 6px;  animation-delay: 0s;    animation-duration: 0.5s; }
    .eq span:nth-child(2) { height: 12px; animation-delay: 0.15s; animation-duration: 0.7s; }
    .eq span:nth-child(3) { height: 8px;  animation-delay: 0.3s;  animation-duration: 0.4s; }
    .eq span:nth-child(4) { height: 14px; animation-delay: 0.1s;  animation-duration: 0.6s; }
    @keyframes eq-bar {
      from { transform: scaleY(0.3); opacity: 0.6; }
      to   { transform: scaleY(1);   opacity: 1; }
    }

    /* ── Video button ── */
    #video-btn {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      z-index: 20;
      display: flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.55rem 1.4rem 0.55rem 1rem;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,150,190,0.35);
      border-radius: 999px;
      cursor: pointer;
      font-family: 'Raleway', sans-serif;
      font-size: 0.72rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(255,210,225,0.85);
      backdrop-filter: blur(8px);
      transition: all 0.3s;
      animation: fade-in 4.5s ease forwards;
      opacity: 0;
    }
    #video-btn:hover {
      background: rgba(255,100,160,0.18);
      border-color: rgba(255,150,190,0.75);
      color: #fff;
      box-shadow: 0 0 22px rgba(230,80,140,0.4);
    }
    #video-btn .vicon {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: rgba(255,100,160,0.25);
      border: 1px solid rgba(255,150,190,0.5);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem;
      transition: background 0.3s;
    }
    #video-btn:hover .vicon { background: rgba(255,80,140,0.4); }

    /* ── Video Modal ── */
    #video-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
      background: rgba(5,0,15,0.88);
      backdrop-filter: blur(12px);
    }
    #video-modal.open { display: flex; }
    #modal-box {
      position: relative;
      width: min(90vw, 860px);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid rgba(255,150,190,0.3);
      box-shadow: 0 0 60px rgba(230,80,140,0.35), 0 0 120px rgba(180,40,100,0.2);
      animation: box-in 0.45s cubic-bezier(.22,1,.36,1);
    }
    @keyframes box-in {
      from { transform: scale(0.88) translateY(30px); opacity: 0; }
      to   { transform: scale(1) translateY(0); opacity: 1; }
    }
    #modal-topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 1rem 0.7rem 1.3rem;
      background: rgba(20,0,30,0.95);
      border-bottom: 1px solid rgba(255,150,190,0.15);
    }
    #modal-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1rem;
      font-style: italic;
      color: rgba(255,200,220,0.9);
      letter-spacing: 0.08em;
    }
    #modal-close {
      background: rgba(255,100,160,0.15);
      border: 1px solid rgba(255,150,190,0.35);
      color: rgba(255,200,220,0.8);
      border-radius: 50%;
      width: 30px; height: 30px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 1rem;
      transition: all 0.2s;
    }
    #modal-close:hover { background: rgba(255,80,140,0.4); color: #fff; }
    #modal-video-wrap {
      background: #000;
      position: relative;
      min-height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #modal-video { width: 100%; max-height: 72vh; display: none; }
    #upload-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      padding: 3.5rem 2rem;
      width: 100%;
    }
    #upload-placeholder .up-icon { font-size: 2.8rem; animation: heartbeat 1.8s ease-in-out infinite; }
    #upload-placeholder p {
      font-family: 'Raleway', sans-serif;
      font-size: 0.78rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: rgba(255,180,210,0.7);
    }
    #upload-placeholder label {
      padding: 0.55rem 1.8rem;
      background: rgba(255,100,160,0.2);
      border: 1px solid rgba(255,150,190,0.5);
      border-radius: 999px;
      color: rgba(255,210,225,0.9);
      font-family: 'Raleway', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.3s;
    }
    #upload-placeholder label:hover { background: rgba(255,80,140,0.35); color: #fff; box-shadow: 0 0 18px rgba(230,80,140,0.4); }
    #file-input { display: none; }
    #modal-footer {
      display: none;
      align-items: center;
      justify-content: space-between;
      padding: 0.6rem 1rem;
      background: rgba(20,0,30,0.95);
      border-top: 1px solid rgba(255,150,190,0.1);
    }
    #modal-footer.visible { display: flex; }
    #modal-filename {
      font-family: 'Raleway', sans-serif;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      color: rgba(255,180,210,0.55);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 70%;
    }
    #change-video-btn {
      background: none;
      border: 1px solid rgba(255,150,190,0.3);
      color: rgba(255,180,210,0.6);
      border-radius: 999px;
      padding: 0.25rem 0.9rem;
      font-family: 'Raleway', sans-serif;
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.25s;
    }
    #change-video-btn:hover { background: rgba(255,80,140,0.2); color: #fff; border-color: rgba(255,150,190,0.6); }
  </style>
</head>
<body>

<svg id="stars" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice"></svg>

<div id="center">
  <div id="name">Ninh Trang</div>
  <div id="tagline"><span id="heart-icon">♥</span><span id="heart-icon">♥</span></div>
</div>

<canvas id="pinkboard"></canvas>


<!-- Video Modal -->
<div id="video-modal">
  <div id="modal-box">
    <div id="modal-topbar">
      <div id="modal-title">♥ Video đáng yêu của bé ♥</div>
      <button id="modal-close" onclick="closeVideoModal()">✕</button>
    </div>
    <div id="modal-video-wrap">
      <div id="upload-placeholder">
        <div class="up-icon">🎬</div>
        <p>Chọn video từ máy của bạn</p>
        <label for="file-input">📂 Chọn file video</label>
        <input type="file" id="file-input" accept="video/*" onchange="loadVideo(this)">
      </div>
      <video id="modal-video" controls></video>
    </div>
    <div id="modal-footer">
      <span id="modal-filename"></span>
      <button id="change-video-btn" onclick="document.getElementById('file-input').click()">Đổi video</button>
    </div>
  </div>
</div>

<!-- Video button -->
<button id="video-btn" onclick="openVideoModal()">
  <div class="vicon">🎬</div>
  Video
</button>

<script>
/* ─── Star field ─── */
(function() {
  const svg = document.getElementById('stars');
  const count = 130;
  for (let i = 0; i < count; i++) {
    const cx = (Math.random() * 1000).toFixed(1);
    const cy = (Math.random() * 600).toFixed(1);
    const r  = (Math.random() * 1.3 + 0.3).toFixed(2);
    const dur = (Math.random() * 4 + 2).toFixed(1);
    const del = (Math.random() * 5).toFixed(1);
    const col = Math.random() < 0.3 ? '#ffcce0' : '#ffffff';
    svg.innerHTML += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${col}" opacity="0.2"
      style="animation:twinkle ${dur}s ${del}s ease-in-out infinite"/>`;
  }
})();

/* ─── Particle heart ─── */
var settings = {
  particles: {
    length:   600,
    duration:  2.5,
    velocity:  90,
    effect:  -0.7,
    size:      28,
  },
};

function Point(x, y) { this.x = x || 0; this.y = y || 0; }
Point.prototype.clone = function() { return new Point(this.x, this.y); };
Point.prototype.length = function(l) {
  if (l === undefined) return Math.sqrt(this.x*this.x + this.y*this.y);
  this.normalize(); this.x *= l; this.y *= l; return this;
};
Point.prototype.normalize = function() {
  var l = this.length(); this.x /= l; this.y /= l; return this;
};

function Particle() {
  this.position = new Point(); this.velocity = new Point();
  this.acceleration = new Point(); this.age = 0;
}
Particle.prototype.initialize = function(x, y, dx, dy) {
  this.position.x = x; this.position.y = y;
  this.velocity.x = dx; this.velocity.y = dy;
  this.acceleration.x = dx * settings.particles.effect;
  this.acceleration.y = dy * settings.particles.effect;
  this.age = 0;
};
Particle.prototype.update = function(dt) {
  this.position.x += this.velocity.x * dt;
  this.position.y += this.velocity.y * dt;
  this.velocity.x += this.acceleration.x * dt;
  this.velocity.y += this.acceleration.y * dt;
  this.age += dt;
};
Particle.prototype.draw = function(ctx, img) {
  function ease(t) { return (--t)*t*t+1; }
  var s = img.width * ease(this.age / settings.particles.duration);
  ctx.globalAlpha = 1 - this.age / settings.particles.duration;
  ctx.drawImage(img, this.position.x - s/2, this.position.y - s/2, s, s);
};

var ParticlePool = (function() {
  var particles, firstActive = 0, firstFree = 0,
      duration = settings.particles.duration;
  function PP(len) {
    particles = new Array(len);
    for (var i = 0; i < len; i++) particles[i] = new Particle();
  }
  PP.prototype.add = function(x, y, dx, dy) {
    particles[firstFree].initialize(x, y, dx, dy);
    if (++firstFree === particles.length) firstFree = 0;
    if (firstActive === firstFree && ++firstActive === particles.length) firstActive = 0;
  };
  PP.prototype.update = function(dt) {
    var i;
    if (firstActive < firstFree)
      for (i = firstActive; i < firstFree; i++) particles[i].update(dt);
    if (firstFree < firstActive) {
      for (i = firstActive; i < particles.length; i++) particles[i].update(dt);
      for (i = 0; i < firstFree; i++) particles[i].update(dt);
    }
    while (particles[firstActive].age >= duration && firstActive !== firstFree) {
      if (++firstActive === particles.length) firstActive = 0;
    }
  };
  PP.prototype.draw = function(ctx, img) {
    var i;
    if (firstActive < firstFree)
      for (i = firstActive; i < firstFree; i++) particles[i].draw(ctx, img);
    if (firstFree < firstActive) {
      for (i = firstActive; i < particles.length; i++) particles[i].draw(ctx, img);
      for (i = 0; i < firstFree; i++) particles[i].draw(ctx, img);
    }
  };
  return PP;
})();

(function(canvas) {
  var ctx = canvas.getContext('2d'),
      pool = new ParticlePool(settings.particles.length),
      rate = settings.particles.length / settings.particles.duration,
      time;

  function pointOnHeart(t) {
    return new Point(
      160 * Math.pow(Math.sin(t), 3),
      130 * Math.cos(t) - 50 * Math.cos(2*t) - 20 * Math.cos(3*t) - 10 * Math.cos(4*t) + 25
    );
  }

  /* Build heart image — gradient fill */
  var image = (function() {
    var c = document.createElement('canvas'), x = c.getContext('2d');
    c.width = c.height = settings.particles.size;
    var sz = settings.particles.size;

    function to(t) {
      var p = pointOnHeart(t);
      p.x = sz/2 + p.x * sz/350;
      p.y = sz/2 - p.y * sz/350;
      return p;
    }

    x.beginPath();
    var t = -Math.PI, p = to(t);
    x.moveTo(p.x, p.y);
    while (t < Math.PI) { t += 0.01; p = to(t); x.lineTo(p.x, p.y); }
    x.closePath();

    var grad = x.createRadialGradient(sz*0.45, sz*0.38, sz*0.05, sz*0.5, sz*0.5, sz*0.55);
    grad.addColorStop(0,   '#ffaed4');
    grad.addColorStop(0.4, '#f0609a');
    grad.addColorStop(1,   '#c0185e');
    x.fillStyle = grad;
    x.fill();

    var img = new Image();
    img.src = c.toDataURL();
    return img;
  })();

  function render() {
    requestAnimationFrame(render);
    var now = Date.now() / 1000, dt = now - (time || now);
    time = now;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    var amt = rate * dt;
    for (var i = 0; i < amt; i++) {
      var pos = pointOnHeart(Math.PI - 2 * Math.PI * Math.random());
      var dir = pos.clone().length(settings.particles.velocity);
      pool.add(canvas.width/2 + pos.x, canvas.height/2 - pos.y, dir.x, -dir.y);
    }
    pool.update(dt);
    pool.draw(ctx, image);
  }

  function onResize() {
    canvas.width  = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
  }
  window.addEventListener('resize', onResize);
  setTimeout(function() { onResize(); render(); }, 10);
})(document.getElementById('pinkboard'));

/* ─── Background Music ─── */
var bgMusic = new Audio('assets/Heart.mp3');
bgMusic.loop = true;
bgMusic.volume = 0.5;
var isMusicPlaying = false;

function playMusic() {
  if (!isMusicPlaying) {
    bgMusic.play().then(function() {
      isMusicPlaying = true;
      document.removeEventListener('click', playMusic);
      document.removeEventListener('touchstart', playMusic);
    }).catch(function(e) {
      console.log("Autoplay blocked, waiting for interaction: ", e);
    });
  }
}

// Play music on first user interaction
document.addEventListener('click', playMusic);
document.addEventListener('touchstart', playMusic);

/* ─── Video Modal ─── */
function openVideoModal() {
  document.getElementById('video-modal').classList.add('open');
  var vid = document.getElementById('modal-video');
  if (!vid.src || vid.src.indexOf('assets/DangYeu.mp4') === -1) {
    vid.src = 'assets/DangYeu.mp4';
    vid.style.display = 'block';
    document.getElementById('upload-placeholder').style.display = 'none';
    document.getElementById('modal-filename').textContent = 'DangYeu.mp4';
    document.getElementById('modal-footer').classList.add('visible');
  }
  // Tạm dừng nhạc nền nếu đang phát để tránh xung đột âm thanh
  if (isMusicPlaying) {
    bgMusic.pause();
    isMusicPlaying = false;
  }
  vid.play();
}
function closeVideoModal() {
  var modal = document.getElementById('video-modal');
  modal.classList.remove('open');
  var vid = document.getElementById('modal-video');
  vid.pause();
  // Phát lại nhạc nền khi đóng video
  bgMusic.play().then(function() {
    isMusicPlaying = true;
  }).catch(function(e) {
    console.log("Cannot resume background music: ", e);
  });
}
function loadVideo(input) {
  if (!input.files || !input.files[0]) return;
  var file = input.files[0];
  var url  = URL.createObjectURL(file);
  var vid  = document.getElementById('modal-video');
  vid.src  = url;
  vid.style.display = 'block';
  document.getElementById('upload-placeholder').style.display = 'none';
  document.getElementById('modal-filename').textContent = file.name;
  document.getElementById('modal-footer').classList.add('visible');
  vid.play();
}
// Close on backdrop click
document.getElementById('video-modal').addEventListener('click', function(e) {
  if (e.target === this) closeVideoModal();
});

</script>
</body>
</html>
