<!DOCTYPE HTML>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ninh Trang ♥</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Raleway:wght@200;300&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #0a0010;
      overflow: hidden;
    }

    #stars {
      position: fixed;
      inset: 0;
      pointer-events: none;
    }

    canvas#pinkboard {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    #center {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -52%);
      text-align: center;
      pointer-events: none;
      z-index: 10;
    }

    #name {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.6rem, 4.5vw, 3rem);
      font-weight: 300;
      font-style: italic;
      color: #fff0f5;
      letter-spacing: 0.12em;
      line-height: 1;
      text-shadow:
        0 0 40px rgba(255,150,190,0.9),
        0 0 80px rgba(230,80,140,0.5),
        0 0 140px rgba(180,40,100,0.3);
      animation: pulse-name 3s ease-in-out infinite;
    }

    #tagline {
      font-family: 'Raleway', sans-serif;
      font-size: clamp(0.55rem, 1.2vw, 0.72rem);
      font-weight: 200;
      color: rgba(255,200,220,0.75);
      letter-spacing: 0.45em;
      text-transform: uppercase;
      margin-top: 1rem;
      animation: fade-in 3s ease forwards, pulse-tag 4s 3s ease-in-out infinite;
      opacity: 0;
    }

    #heart-icon {
      font-size: 1.1rem;
      color: #ff7aaa;
      display: inline-block;
      animation: heartbeat 1.2s ease-in-out infinite;
      margin: 0 0.5rem;
      text-shadow: 0 0 12px rgba(255,100,160,0.8);
    }

    @keyframes pulse-name {
      0%, 100% { text-shadow: 0 0 40px rgba(255,150,190,0.9), 0 0 80px rgba(230,80,140,0.5), 0 0 140px rgba(180,40,100,0.3); }
      50%       { text-shadow: 0 0 60px rgba(255,170,210,1),   0 0 110px rgba(240,100,160,0.7), 0 0 180px rgba(200,60,120,0.5); }
    }
    @keyframes fade-in {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-tag {
      0%, 100% { opacity: 0.75; }
      50%       { opacity: 1; }
    }
    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      14%       { transform: scale(1.35); }
      28%       { transform: scale(1); }
      42%       { transform: scale(1.2); }
      70%       { transform: scale(1); }
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0.15; }
      50%       { opacity: 0.9; }
    }
  </style>
</head>
<body>

<svg id="stars" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice"></svg>

<div id="center">
  <div id="name">Ninh Trang</div>
</div>

<canvas id="pinkboard"></canvas>

<script>
/* ─── Star field ─── */
(function() {
  const svg = document.getElementById('stars');
  const count = 130;
  for (let i = 0; i < count; i++) {
    const cx = (Math.random() * 1000).toFixed(1);
    const cy = (Math.random() * 600).toFixed(1);
    const r  = (Math.random() * 1.3 + 0.3).toFixed(2);
    const dur = (Math.random() * 4 + 2).toFixed(1);
    const del = (Math.random() * 5).toFixed(1);
    const col = Math.random() < 0.3 ? '#ffcce0' : '#ffffff';
    svg.innerHTML += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${col}" opacity="0.2"
      style="animation:twinkle ${dur}s ${del}s ease-in-out infinite"/>`;
  }
})();

/* ─── Particle heart ─── */
var settings = {
  particles: {
    length:   600,
    duration:  2.5,
    velocity:  90,
    effect:  -0.7,
    size:      28,
  },
};

function Point(x, y) { this.x = x || 0; this.y = y || 0; }
Point.prototype.clone = function() { return new Point(this.x, this.y); };
Point.prototype.length = function(l) {
  if (l === undefined) return Math.sqrt(this.x*this.x + this.y*this.y);
  this.normalize(); this.x *= l; this.y *= l; return this;
};
Point.prototype.normalize = function() {
  var l = this.length(); this.x /= l; this.y /= l; return this;
};

function Particle() {
  this.position = new Point(); this.velocity = new Point();
  this.acceleration = new Point(); this.age = 0;
}
Particle.prototype.initialize = function(x, y, dx, dy) {
  this.position.x = x; this.position.y = y;
  this.velocity.x = dx; this.velocity.y = dy;
  this.acceleration.x = dx * settings.particles.effect;
  this.acceleration.y = dy * settings.particles.effect;
  this.age = 0;
};
Particle.prototype.update = function(dt) {
  this.position.x += this.velocity.x * dt;
  this.position.y += this.velocity.y * dt;
  this.velocity.x += this.acceleration.x * dt;
  this.velocity.y += this.acceleration.y * dt;
  this.age += dt;
};
Particle.prototype.draw = function(ctx, img) {
  function ease(t) { return (--t)*t*t+1; }
  var s = img.width * ease(this.age / settings.particles.duration);
  ctx.globalAlpha = 1 - this.age / settings.particles.duration;
  ctx.drawImage(img, this.position.x - s/2, this.position.y - s/2, s, s);
};

var ParticlePool = (function() {
  var particles, firstActive = 0, firstFree = 0,
      duration = settings.particles.duration;
  function PP(len) {
    particles = new Array(len);
    for (var i = 0; i < len; i++) particles[i] = new Particle();
  }
  PP.prototype.add = function(x, y, dx, dy) {
    particles[firstFree].initialize(x, y, dx, dy);
    if (++firstFree === particles.length) firstFree = 0;
    if (firstActive === firstFree && ++firstActive === particles.length) firstActive = 0;
  };
  PP.prototype.update = function(dt) {
    var i;
    if (firstActive < firstFree)
      for (i = firstActive; i < firstFree; i++) particles[i].update(dt);
    if (firstFree < firstActive) {
      for (i = firstActive; i < particles.length; i++) particles[i].update(dt);
      for (i = 0; i < firstFree; i++) particles[i].update(dt);
    }
    while (particles[firstActive].age >= duration && firstActive !== firstFree) {
      if (++firstActive === particles.length) firstActive = 0;
    }
  };
  PP.prototype.draw = function(ctx, img) {
    var i;
    if (firstActive < firstFree)
      for (i = firstActive; i < firstFree; i++) particles[i].draw(ctx, img);
    if (firstFree < firstActive) {
      for (i = firstActive; i < particles.length; i++) particles[i].draw(ctx, img);
      for (i = 0; i < firstFree; i++) particles[i].draw(ctx, img);
    }
  };
  return PP;
})();

(function(canvas) {
  var ctx = canvas.getContext('2d'),
      pool = new ParticlePool(settings.particles.length),
      rate = settings.particles.length / settings.particles.duration,
      time;

  function pointOnHeart(t) {
    return new Point(
      160 * Math.pow(Math.sin(t), 3),
      130 * Math.cos(t) - 50 * Math.cos(2*t) - 20 * Math.cos(3*t) - 10 * Math.cos(4*t) + 25
    );
  }

  /* Build heart image — gradient fill */
  var image = (function() {
    var c = document.createElement('canvas'), x = c.getContext('2d');
    c.width = c.height = settings.particles.size;
    var sz = settings.particles.size;

    function to(t) {
      var p = pointOnHeart(t);
      p.x = sz/2 + p.x * sz/350;
      p.y = sz/2 - p.y * sz/350;
      return p;
    }

    x.beginPath();
    var t = -Math.PI, p = to(t);
    x.moveTo(p.x, p.y);
    while (t < Math.PI) { t += 0.01; p = to(t); x.lineTo(p.x, p.y); }
    x.closePath();

    var grad = x.createRadialGradient(sz*0.45, sz*0.38, sz*0.05, sz*0.5, sz*0.5, sz*0.55);
    grad.addColorStop(0,   '#ffaed4');
    grad.addColorStop(0.4, '#f0609a');
    grad.addColorStop(1,   '#c0185e');
    x.fillStyle = grad;
    x.fill();

    var img = new Image();
    img.src = c.toDataURL();
    return img;
  })();

  function render() {
    requestAnimationFrame(render);
    var now = Date.now() / 1000, dt = now - (time || now);
    time = now;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    var amt = rate * dt;
    for (var i = 0; i < amt; i++) {
      var pos = pointOnHeart(Math.PI - 2 * Math.PI * Math.random());
      var dir = pos.clone().length(settings.particles.velocity);
      pool.add(canvas.width/2 + pos.x, canvas.height/2 - pos.y, dir.x, -dir.y);
    }
    pool.update(dt);
    pool.draw(ctx, image);
  }

  function onResize() {
    canvas.width  = canvas.clientWidth;
    canvas.height = canvas.clientHeight;
  }
  window.addEventListener('resize', onResize);
  setTimeout(function() { onResize(); render(); }, 10);
})(document.getElementById('pinkboard'));
</script>
</body>
</html>
